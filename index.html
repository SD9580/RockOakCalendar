<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock Oak Events Schedule</title>
<meta http-equiv="refresh" content="900">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1d26;
    color: #e8e8e8;
    font-family: 'Inter', -apple-system, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Mobile view hidden on desktop */
  .mobile-view { display: none; }

  /* ── HEADER ── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px 14px;
    border-bottom: 2px solid #2a2d38;
  }
  .header-center {
    text-align: center;
  }
  .last-synced {
    font-size: 20px;
    font-weight: 600;
    color: #b0b4c8;
    margin-top: 4px;
  }
  .header-left {
    display: flex;
    align-items: baseline;
    gap: 18px;
    flex-wrap: wrap;
  }
  .header h1 {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: #fff;
  }
  .header .subtitle {
    font-size: 15px;
    color: #7a7e94;
    font-weight: 500;
    max-width: 360px;
    line-height: 1.3;
  }
  .header .week-label {
    font-size: 38px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.3px;
  }

  /* ── STATUS BAR ── */
  .status-bar {
    display: none;
    padding: 8px 40px;
    background: #1a1520;
    border-bottom: 1px solid #2a2030;
    font-size: 14px;
    color: #e07070;
    font-weight: 600;
  }
  .status-bar.visible { display: block; }
  .status-bar.ok { color: #3ecfb4; background: #141d1a; border-color: #1c2d28; }

  /* ── CALENDAR GRID ── */
  .calendar {
    flex: 1;
    display: grid;
    grid-template-columns: 80px repeat(7, 1fr);
    grid-template-rows: auto 1fr;
    gap: 0;
    padding: 0 20px 20px;
    overflow: hidden;
  }

  /* Day headers */
  .day-header {
    text-align: center;
    padding: 14px 0 10px;
    font-weight: 700;
    font-size: 18px;
    color: #7b7f96;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 2px solid #2a2d38;
  }
  .day-header.today {
    color: #3ecfb4;
    border-bottom-color: #3ecfb4;
  }
  .day-header .date-num {
    display: block;
    font-size: 32px;
    font-weight: 800;
    margin-top: 2px;
    color: #b0b4c8;
  }
  .day-header.today .date-num {
    color: #3ecfb4;
  }
  .day-header .exercise-bar {
    display: block;
    margin: 8px 4px 0;
    padding: 5px 8px;
    background: rgba(52, 152, 219, 0.85);
    color: #ffffff;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3px;
    border-radius: 4px;
    text-transform: none;
    line-height: 1.25;
  }
  .day-header .exercise-bar .exercise-label {
    display: block;
    font-size: 12px;
    opacity: 0.9;
    margin-bottom: 1px;
  }
  .day-header .exercise-bar .exercise-hours {
    display: block;
    font-size: 14px;
    font-weight: 800;
  }
  .time-header {
    border-bottom: 2px solid #2a2d38;
  }

  /* Day columns */
  .day-column {
    position: relative;
    border-left: 1px solid #252830;
    min-height: 0;
  }
  .day-column.today-col {
    background: rgba(62, 207, 180, 0.04);
  }
  .day-column.past-col {
    background: rgba(0, 0, 0, 0.25);
  }
  .day-column.past-col .event {
    opacity: 0.45;
  }
  .day-header.past {
    opacity: 0.45;
  }

  .time-labels {
    position: relative;
  }
  .time-label {
    position: absolute;
    right: 10px;
    font-size: 14px;
    font-weight: 600;
    color: #5a5e72;
    transform: translateY(-50%);
  }
  .day-column .hour-line-marker {
    position: absolute;
    left: 0;
    right: 0;
    border-top: 1px solid #252830;
  }

  /* Event blocks — bright green for visibility on TV */
  .event {
    position: absolute;
    left: 4px;
    right: 4px;
    border-radius: 8px;
    padding: 10px 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    font-weight: 600;
    border-left: 6px solid #4ade80;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    background: rgba(74, 222, 128, 0.28);
    color: #effbf3;
  }
  .event .client-name {
    font-size: 28px;
    font-weight: 800;
    line-height: 1.15;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    word-break: break-word;
  }
  .event .time-range {
    font-size: 20px;
    font-weight: 700;
    opacity: 0.9;
    margin-top: 3px;
  }
  .event .space-name {
    font-size: 14px;
    font-weight: 500;
    opacity: 0.65;
    margin-top: 2px;
  }

  /* Compact layout for short bookings (≤2 hours) */
  .event.compact {
    padding: 2px 10px;
  }
  .event.compact .client-name {
    font-size: 22px;
  }
  .event.compact .time-range {
    font-size: 16px;
    margin-top: 1px;
  }
  .event.compact .space-name {
    display: none;
  }

  /* ── NOW INDICATOR ── */
  .now-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 3px;
    background: #3ecfb4;
    z-index: 10;
    box-shadow: 0 0 8px rgba(62, 207, 180, 0.55);
  }
  .now-dot {
    position: absolute;
    left: -5px;
    top: -4px;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: #3ecfb4;
  }

  /* ── FOOTER ── */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 40px;
    border-top: 1px solid #252830;
    background: #1e2129;
    font-size: 15px;
    color: #5a5e72;
  }

  /* ── EMPTY STATE ── */
  .empty-day {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 14px;
    color: #2a2d3a;
    font-weight: 600;
  }

  /* ── LOADING ── */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: #1a1d26;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.5s;
  }
  .loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .loading-text {
    font-size: 20px;
    color: #7b7f96;
    font-weight: 600;
  }

  /* ══════════════════════════════════════════════ */
  /* MOBILE RESPONSIVE — vertical day-by-day list  */
  /* ══════════════════════════════════════════════ */
  @media (max-width: 768px) {
    body {
      height: auto;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .calendar { display: none !important; }
    .mobile-view { display: block !important; }

    .header {
      flex-direction: column;
      align-items: flex-start;
      padding: 16px 20px 12px;
      gap: 4px;
    }
    .header h1 { font-size: 22px; }
    .header .subtitle { font-size: 12px; max-width: none; }
    .header .week-label { font-size: 20px; }
    .last-synced { font-size: 13px; }
    .header-center { text-align: left; }

    .footer { padding: 10px 20px; font-size: 13px; }

    .mobile-view {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 20px;
    }
    .m-day { margin-top: 16px; }
    .m-day-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 10px 0 8px;
      border-bottom: 2px solid #2a2d38;
    }
    .m-day-name {
      font-size: 14px;
      font-weight: 700;
      color: #7b7f96;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .m-day-date {
      font-size: 20px;
      font-weight: 800;
      color: #b0b4c8;
    }
    .m-day.m-today .m-day-name,
    .m-day.m-today .m-day-date {
      color: #3ecfb4;
    }
    .m-day.m-today .m-day-header {
      border-bottom-color: #3ecfb4;
    }
    .m-day.m-past .m-day-header,
    .m-day.m-past .m-event {
      opacity: 0.45;
    }
    .m-no-events {
      padding: 12px 0;
      font-size: 14px;
      color: #3a3d4a;
      font-weight: 600;
    }
    .m-exercise-bar {
      display: block;
      margin-top: 8px;
      padding: 6px 12px;
      background: rgba(52, 152, 219, 0.85);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      border-radius: 4px;
      letter-spacing: 0.3px;
    }

    .m-event {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      margin-top: 8px;
      border-radius: 10px;
      border-left: 5px solid #4ade80;
      background: rgba(74, 222, 128, 0.22);
      color: #effbf3;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    .m-event .m-event-info {
      flex: 1;
      min-width: 0;
    }
    .m-event .m-client {
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .m-event .m-time {
      font-size: 15px;
      font-weight: 700;
      opacity: 0.85;
      margin-top: 2px;
    }
    .m-event .m-space {
      font-size: 12px;
      font-weight: 500;
      opacity: 0.6;
      margin-top: 1px;
    }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-text">Loading schedule...</div>
</div>

<div class="header">
  <div class="header-left">
    <h1>Rock Oak Events</h1>
    <span class="subtitle">Live weekly schedule — refreshes every 15 minutes</span>
  </div>
  <div class="header-center">
    <div class="week-label" id="weekLabel"></div>
    <div class="last-synced" id="lastSynced"></div>
  </div>
  <div style="min-width: 200px;"></div>
</div>

<div class="status-bar" id="statusBar"></div>

<div class="calendar" id="calendar"></div>

<div class="mobile-view" id="mobileView"></div>

<div class="footer">
  <span id="lastUpdated">Live from Google Calendar</span>
  <span id="clock"></span>
</div>

<script>
// ══════════════════════════════════════════════
// CONFIGURATION  ──  EDIT THESE TWO VALUES
// ══════════════════════════════════════════════
const CONFIG = {
  // Your Google Calendar ID (looks like: something@group.calendar.google.com,
  // or your gmail address for your primary calendar).
  // Get it from: Google Calendar → Settings → [your calendar] → "Integrate calendar" → Calendar ID
  CALENDAR_ID: '5293f7d8a49ce74df477c7b2a900d51047683d6617ed664d75626ea39a3fcb71@group.calendar.google.com',

  // Your Google Cloud API key (restricted to the Calendar API).
  // Setup steps are in README.md.
  API_KEY: 'AIzaSyBm7R1Vo40uFCWLfnhQGWP1SysuvBMQHLU',

  // Display settings
  TIMEZONE: 'America/New_York',
  HOUR_START: 7,    // 7 AM
  HOUR_END: 23,     // 11 PM
  REFRESH_INTERVAL: 15 * 60 * 1000,  // 15 minutes
};

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let currentEvents = [];
let lastFetchedAt = null;

const DAYS = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const TOTAL_HOURS = CONFIG.HOUR_END - CONFIG.HOUR_START;

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
function getWeekBounds() {
  const now = new Date();
  const dayOfWeek = now.getDay();
  const sunday = new Date(now);
  sunday.setDate(now.getDate() - dayOfWeek);
  sunday.setHours(0, 0, 0, 0);
  const saturday = new Date(sunday);
  saturday.setDate(sunday.getDate() + 7);
  return { start: sunday, end: saturday };
}

function getWeekDates() {
  const { start } = getWeekBounds();
  return Array.from({length: 7}, (_, i) => {
    const d = new Date(start);
    d.setDate(d.getDate() + i);
    return d;
  });
}

function formatHour(h) {
  if (h === 0 || h === 24) return '12 AM';
  if (h === 12) return '12 PM';
  return h < 12 ? h + ' AM' : (h - 12) + ' PM';
}

function formatHourShort(h) {
  if (h === 0 || h === 24) return '12a';
  if (h === 12) return '12p';
  return h < 12 ? h + 'a' : (h - 12) + 'p';
}

function isSameDay(d1, d2) {
  return d1.getFullYear() === d2.getFullYear() &&
         d1.getMonth() === d2.getMonth() &&
         d1.getDate() === d2.getDate();
}

// Compact formatter for the exercise room bar: 8a, 8:30a, 12p, etc.
function formatHourCompact(h) {
  const hour = Math.floor(h);
  const min = Math.round((h - hour) * 60);
  let displayHour = hour % 12;
  if (displayHour === 0) displayHour = 12;
  const period = (hour < 12 || hour === 24) ? 'a' : 'p';
  if (min === 0) return displayHour + period;
  return displayHour + ':' + String(min).padStart(2, '0') + period;
}

function formatExerciseRanges(events) {
  return events
    .slice()
    .sort((a, b) => a.startHour - b.startHour)
    .map(e => formatHourCompact(e.startHour) + '–' + formatHourCompact(e.endHour))
    .join(', ');
}

// ══════════════════════════════════════════════
// FETCH EVENTS FROM GOOGLE CALENDAR API
// ══════════════════════════════════════════════
async function fetchEvents() {
  if (CONFIG.CALENDAR_ID.startsWith('YOUR_') || CONFIG.API_KEY.startsWith('YOUR_')) {
    showStatus('Calendar not yet configured — edit CALENDAR_ID and API_KEY in index.html', false);
    return [];
  }

  const { start, end } = getWeekBounds();
  const url = 'https://www.googleapis.com/calendar/v3/calendars/' +
    encodeURIComponent(CONFIG.CALENDAR_ID) + '/events?' +
    'key=' + encodeURIComponent(CONFIG.API_KEY) +
    '&timeMin=' + encodeURIComponent(start.toISOString()) +
    '&timeMax=' + encodeURIComponent(end.toISOString()) +
    '&singleEvents=true' +
    '&orderBy=startTime' +
    '&maxResults=250';

  try {
    const res = await fetch(url);
    if (!res.ok) {
      const errText = await res.text();
      throw new Error('HTTP ' + res.status + ' — ' + errText.slice(0, 200));
    }
    const data = await res.json();
    lastFetchedAt = new Date();

    currentEvents = (data.items || []).flatMap(ev => {
      // Skip cancelled events
      if (ev.status === 'cancelled') return [];

      // Determine start/end as Date objects.
      let start, end, isAllDay = false;
      if (ev.start.dateTime) {
        start = new Date(ev.start.dateTime);
        end = new Date(ev.end.dateTime);
      } else if (ev.start.date) {
        // All-day event — Google encodes as YYYY-MM-DD
        isAllDay = true;
        start = new Date(ev.start.date + 'T00:00:00');
        end = new Date(ev.end.date + 'T00:00:00');
      } else {
        return [];
      }

      const title = (ev.summary || '(Untitled)').trim();
      const location = (ev.location || '').trim();
      const isExerciseRoom = title.toLowerCase() === 'exercise room';

      // For an all-day event, place it at the top of the day(s) it covers.
      // For multi-day timed events, only render on the start day to keep things sane.
      const startHour = start.getHours() + start.getMinutes() / 60;
      let endHour = end.getHours() + end.getMinutes() / 60;

      // Crossing midnight or all-day → cap at end of day.
      if (!isSameDay(start, end)) endHour = 24;
      if (endHour === 0) endHour = 24;
      if (isAllDay) {
        return [{
          title, space: location, start, end,
          startHour: CONFIG.HOUR_START,
          endHour: CONFIG.HOUR_START + 0.75,
          dayIndex: start.getDay(),
          isAllDay: true,
          isExerciseRoom,
        }];
      }

      return [{
        title, space: location, start, end,
        startHour, endHour,
        dayIndex: start.getDay(),
        isAllDay: false,
        isExerciseRoom,
      }];
    });

    showStatus('Loaded ' + currentEvents.length + ' events this week', true);

    if (lastFetchedAt) {
      document.getElementById('lastSynced').textContent =
        'Updated ' + lastFetchedAt.toLocaleTimeString('en-US', {
          hour: 'numeric', minute: '2-digit', hour12: true
        });
    }

    return currentEvents;
  } catch (err) {
    console.error('Failed to fetch events:', err);
    showStatus('Failed to load schedule: ' + err.message, false);
    return currentEvents;
  }
}

function showStatus(msg, ok) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = 'status-bar visible' + (ok ? ' ok' : '');
  if (ok) setTimeout(() => { bar.classList.remove('visible'); }, 10000);
}

// ══════════════════════════════════════════════
// RENDER CALENDAR
// ══════════════════════════════════════════════
function buildCalendar() {
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  const now = new Date();
  const weekDates = getWeekDates();

  // Week label
  const ws = weekDates[0];
  const we = weekDates[6];
  document.getElementById('weekLabel').textContent =
    `${MONTH_NAMES[ws.getMonth()]} ${ws.getDate()} – ${we.getDate()}, ${ws.getFullYear()}`;

  // Header row
  const timeCorner = document.createElement('div');
  timeCorner.className = 'time-header';
  cal.appendChild(timeCorner);

  weekDates.forEach((d, i) => {
    const hdr = document.createElement('div');
    const isToday = isSameDay(d, now);
    const isPast = d < now && !isToday;
    hdr.className = 'day-header' + (isToday ? ' today' : '') + (isPast ? ' past' : '');
    let html = `${DAYS[i]}<span class="date-num">${d.getDate()}</span>`;

    // Exercise Room: render as a compact blue bar, not a time-grid block
    const exerciseToday = currentEvents.filter(e => e.dayIndex === i && e.isExerciseRoom);
    if (exerciseToday.length) {
      html += `<span class="exercise-bar">
        <span class="exercise-label">Exercise Room</span>
        <span class="exercise-hours">${formatExerciseRanges(exerciseToday)}</span>
      </span>`;
    }

    hdr.innerHTML = html;
    cal.appendChild(hdr);
  });

  // Time labels column
  const timeCol = document.createElement('div');
  timeCol.className = 'time-labels';
  for (let h = CONFIG.HOUR_START; h <= CONFIG.HOUR_END; h++) {
    const pct = ((h - CONFIG.HOUR_START) / TOTAL_HOURS) * 100;
    const lbl = document.createElement('div');
    lbl.className = 'time-label';
    lbl.style.top = pct + '%';
    lbl.textContent = formatHourShort(h);
    timeCol.appendChild(lbl);
  }
  cal.appendChild(timeCol);

  // Day columns
  for (let dayIdx = 0; dayIdx < 7; dayIdx++) {
    const col = document.createElement('div');
    col.className = 'day-column';

    const isToday = isSameDay(weekDates[dayIdx], now);
    const isPast = weekDates[dayIdx] < now && !isToday;
    if (isToday) col.classList.add('today-col');
    if (isPast) col.classList.add('past-col');

    // Hour grid lines
    for (let h = CONFIG.HOUR_START; h <= CONFIG.HOUR_END; h++) {
      const pct = ((h - CONFIG.HOUR_START) / TOTAL_HOURS) * 100;
      const line = document.createElement('div');
      line.className = 'hour-line-marker';
      line.style.top = pct + '%';
      col.appendChild(line);
    }

    // Events for this day (Exercise Room is rendered as a header bar instead)
    const dayEvents = currentEvents.filter(e => e.dayIndex === dayIdx && !e.isExerciseRoom);
    dayEvents.forEach(ev => {
      // Clamp into displayed range so off-hours events still show at the edge.
      const clampedStart = Math.max(ev.startHour, CONFIG.HOUR_START);
      const clampedEnd = Math.min(ev.endHour, CONFIG.HOUR_END);
      if (clampedEnd <= CONFIG.HOUR_START || clampedStart >= CONFIG.HOUR_END) return;

      const topPct = ((clampedStart - CONFIG.HOUR_START) / TOTAL_HOURS) * 100;
      const heightPct = ((clampedEnd - clampedStart) / TOTAL_HOURS) * 100;

      const duration = clampedEnd - clampedStart;
      const isCompact = duration <= 2;
      const block = document.createElement('div');
      block.className = 'event' + (isCompact ? ' compact' : '');
      block.style.top = topPct + '%';
      block.style.height = heightPct + '%';

      const startLabel = ev.isAllDay ? 'All day' : formatHour(Math.floor(ev.startHour));
      const endLabel = ev.isAllDay ? '' : ' – ' + formatHour(Math.floor(ev.endHour));

      block.innerHTML = `
        <div class="client-name">${escapeHtml(ev.title)}</div>
        <div class="time-range">${startLabel}${endLabel}</div>
        <div class="space-name">${escapeHtml(ev.space)}</div>
      `;
      col.appendChild(block);
    });

    // Now indicator
    if (isToday) {
      const nowH = now.getHours() + now.getMinutes() / 60;
      if (nowH >= CONFIG.HOUR_START && nowH <= CONFIG.HOUR_END) {
        const nowPct = ((nowH - CONFIG.HOUR_START) / TOTAL_HOURS) * 100;
        const nowLine = document.createElement('div');
        nowLine.className = 'now-line';
        nowLine.style.top = nowPct + '%';
        nowLine.innerHTML = '<div class="now-dot"></div>';
        col.appendChild(nowLine);
      }
    }

    if (dayEvents.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-day';
      empty.textContent = '—';
      col.appendChild(empty);
    }

    cal.appendChild(col);
  }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  })[c]);
}

// ══════════════════════════════════════════════
// RENDER MOBILE VIEW
// ══════════════════════════════════════════════
function buildMobileView() {
  const container = document.getElementById('mobileView');
  container.innerHTML = '';

  const now = new Date();
  const weekDates = getWeekDates();
  const FULL_DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  const todayIdx = now.getDay();
  for (let offset = 0; offset < 7; offset++) {
    const dayIdx = (todayIdx + offset) % 7;
    const date = weekDates[dayIdx];
    const isToday = isSameDay(date, now);
    const isPast = date < now && !isToday;

    const section = document.createElement('div');
    section.className = 'm-day' + (isToday ? ' m-today' : '') + (isPast ? ' m-past' : '');

    const dateStr = `${MONTH_NAMES[date.getMonth()]} ${date.getDate()}`;
    section.innerHTML = `<div class="m-day-header">
      <span class="m-day-name">${isToday ? 'Today' : FULL_DAYS[dayIdx]}</span>
      <span class="m-day-date">${dateStr}</span>
    </div>`;

    // Exercise Room: render as a blue bar (not as a regular event card)
    const exerciseToday = currentEvents.filter(e => e.dayIndex === dayIdx && e.isExerciseRoom);
    if (exerciseToday.length) {
      const bar = document.createElement('div');
      bar.className = 'm-exercise-bar';
      bar.textContent = 'Exercise Room: ' + formatExerciseRanges(exerciseToday);
      section.appendChild(bar);
    }

    const dayEvents = currentEvents
      .filter(e => e.dayIndex === dayIdx && !e.isExerciseRoom)
      .sort((a, b) => a.startHour - b.startHour);

    if (dayEvents.length === 0) {
      const noEv = document.createElement('div');
      noEv.className = 'm-no-events';
      noEv.textContent = 'No events';
      section.appendChild(noEv);
    } else {
      dayEvents.forEach(ev => {
        const card = document.createElement('div');
        card.className = 'm-event';
        const startLabel = ev.isAllDay ? 'All day' : formatHour(Math.floor(ev.startHour));
        const endLabel = ev.isAllDay ? '' : ' – ' + formatHour(Math.floor(ev.endHour));
        card.innerHTML = `<div class="m-event-info">
          <div class="m-client">${escapeHtml(ev.title)}</div>
          <div class="m-time">${startLabel}${endLabel}</div>
          <div class="m-space">${escapeHtml(ev.space)}</div>
        </div>`;
        section.appendChild(card);
      });
    }

    container.appendChild(section);
  }
}

// ══════════════════════════════════════════════
// CLOCK
// ══════════════════════════════════════════════
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', {
    hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true
  });
}

// ══════════════════════════════════════════════
// MAIN LOOP
// ══════════════════════════════════════════════
async function init() {
  await fetchEvents();
  buildCalendar();
  buildMobileView();

  document.getElementById('loadingOverlay').classList.add('hidden');

  updateClock();
  setInterval(updateClock, 1000);

  // Rebuild calendar every minute (to slide the now-line and update past/today)
  setInterval(() => { buildCalendar(); buildMobileView(); }, 60 * 1000);

  // Re-fetch from Google Calendar every 15 minutes
  setInterval(async () => {
    await fetchEvents();
    buildCalendar();
    buildMobileView();
  }, CONFIG.REFRESH_INTERVAL);
}

init();
</script>
